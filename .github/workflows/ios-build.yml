name: Build iOS IPA

# ─── iOS — Por configurar ─────────────────────────────────────────────────────
# Requiere:
#   - Mac runner (macos-latest) — usa minutos premium de GitHub Actions
#   - Apple Developer certificate (.p12) → secret: APPLE_CERT_BASE64
#   - Provisioning profile (.mobileprovision) → secret: APPLE_PROFILE_BASE64
#   - App Store Connect API key → secrets: ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_BASE64
#
# Estado: PENDIENTE DE CONFIGURAR
# Activar: cambiar workflow_dispatch por push cuando los secrets estén listos
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:   # Solo manual hasta que Apple Developer esté configurado

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build web assets
        run: npx vite build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

