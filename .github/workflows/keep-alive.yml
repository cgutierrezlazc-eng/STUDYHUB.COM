name: Keep Backend Alive

# Pings the Render backend every 14 minutes to prevent cold starts.
# Render free tier sleeps after 15 min of inactivity → this keeps it warm.

on:
  schedule:
    - cron: '*/14 * * * *'   # every 14 minutes, 24/7
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://studyhub-api-bpco.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend returned $STATUS"
          fi
