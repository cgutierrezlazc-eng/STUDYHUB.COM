name: Build Android AAB + APK

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'vite.config.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build web assets
        run: npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      # ── Java & Android ────────────────────────────────────────────────────
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
          echo "✅ SDK 36 instalado"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Gradle build ──────────────────────────────────────────────────────
      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --stacktrace

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # ── Artefactos ────────────────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: conniku-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: conniku-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Build summary
        run: |
          AAB_SIZE=$(du -sh android/app/build/outputs/bundle/release/app-release.aab 2>/dev/null | cut -f1 || echo "N/A")
          APK_SIZE=$(du -sh android/app/build/outputs/apk/release/app-release-unsigned.apk 2>/dev/null | cut -f1 || echo "N/A")
          echo "## ✅ Build Android completado" >> $GITHUB_STEP_SUMMARY
          echo "| Artefacto | Tamaño |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| AAB (Play Store) | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| APK (directo) | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
