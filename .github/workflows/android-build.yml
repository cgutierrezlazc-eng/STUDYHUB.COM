name: Build Android AAB + APK

# ─── Se dispara en cada push a main que toque código relevante ────────────────
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'vite.config.*'
  workflow_dispatch:   # también permite disparo manual

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Verificación rápida antes de compilar ──────────────────────────────
      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build web assets
        run: npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      # ── Android ────────────────────────────────────────────────────────────
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # ── Artefactos ─────────────────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: conniku-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: conniku-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ Build Android completado" >> $GITHUB_STEP_SUMMARY
          echo "- **AAB**: listo para Play Store" >> $GITHUB_STEP_SUMMARY
          echo "- **APK**: listo para distribución directa" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
