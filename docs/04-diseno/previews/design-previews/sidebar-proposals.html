<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conniku — Estilos de Iconos Sidebar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #e2e8f0; padding: 24px; }
h1 { text-align: center; color: #0f172a; margin-bottom: 4px; font-size: 24px; }
p.sub { text-align: center; color: #64748b; margin-bottom: 28px; font-size: 13px; }
h2.prop-title { text-align: center; color: #0f172a; font-size: 18px; margin: 36px 0 6px; padding-top: 28px; border-top: 2px solid #cbd5e1; }
h2.prop-title:first-of-type { border-top: none; margin-top: 8px; }
p.prop-desc { text-align: center; color: #64748b; font-size: 12px; margin-bottom: 16px; }
.row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
.col { display: flex; flex-direction: column; align-items: center; }
.theme-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 6px; }

/* ─── SIDEBAR SHELL ─── */
.sb {
  width: 230px; height: 540px; display: flex; flex-direction: column;
  overflow-y: auto; padding: 12px 0 0; font-size: 12.5px; border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.sb::-webkit-scrollbar { width: 3px; }
.sb::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 4px; }

.sb-hdr { padding: 4px 16px 10px; display: flex; align-items: center; gap: 8px; }
.sb-logo { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sb-logo svg { width: 15px; height: 15px; }
.sb-brand { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
.sb-brand b { font-weight: 400; }

.sb-sec { padding: 0 10px; }
.sb-st { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; padding: 10px 8px 4px; }

.sb-i {
  display: flex; align-items: center; gap: 9px; padding: 6px 10px;
  border-radius: 8px; cursor: pointer; font-weight: 450; transition: all 0.15s;
  border: none; background: none; width: 100%; text-align: left; font-size: 12.5px;
  font-family: inherit; position: relative;
}
.sb-i .ic { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.sb-i .ic svg { width: 18px; height: 18px; }
.sb-badge { margin-left: auto; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 8px; min-width: 16px; text-align: center; line-height: 14px; background: #ef4444; color: #fff; }

/* ═══════════════════════════════════════════════
   THEME BASE COLORS
   ═══════════════════════════════════════════════ */

/* Default (claro crema) */
.t-default { background: #FAFAF8; color: #475569; border: 1px solid #e5e2db; }
.t-default .sb-brand { color: #0F172A; }
.t-default .sb-brand b { color: #2563EB; }
.t-default .sb-st { color: #94a3b8; }
.t-default .sb-i { color: #64748b; }
.t-default .sb-i:hover { background: rgba(0,0,0,0.04); color: #1D2939; }
.t-default .sb-logo { background: #2563EB; }

/* Nocturno (oscuro) */
.t-noc { background: #161B22; color: #8b949e; border: 1px solid #30363d; }
.t-noc .sb-brand { color: #E6EDF3; }
.t-noc .sb-brand b { color: #2563EB; }
.t-noc .sb-st { color: #484f58; }
.t-noc .sb-i { color: #8b949e; }
.t-noc .sb-i:hover { background: rgba(255,255,255,0.04); color: #c9d1d9; }
.t-noc .sb-logo { background: #2563EB; }

/* Calido (oscuro calido) */
.t-cal { background: #1A1D24; color: #9ca3af; border: 1px solid #2d3139; }
.t-cal .sb-brand { color: #ECECEF; }
.t-cal .sb-brand b { color: #2563EB; }
.t-cal .sb-st { color: #4b5563; }
.t-cal .sb-i { color: #9ca3af; }
.t-cal .sb-i:hover { background: rgba(255,255,255,0.04); color: #d1d5db; }
.t-cal .sb-logo { background: #2563EB; }

/* ═══════════════════════════════════════════════
   ICON COLORS (per-icon unique colors)
   ═══════════════════════════════════════════════ */

/* ── Style 1: Duotone ── */
.s1 .ic-profile svg { --ic: #3B82F6; }
.s1 .ic-feed svg { --ic: #F97316; }
.s1 .ic-community svg { --ic: #8B5CF6; }

.s1 .ic-subs svg { --ic: #F43F5E; }

.t-default .sb-i.on::before { content:''; position:absolute; left:0; top:4px; bottom:4px; width:3px; border-radius:0 3px 3px 0; background:#2563EB; }

const themes = [
  { cls: 't-default', label: 'Default' },
  { cls: 't-noc', label: 'Nocturno' },
  { cls: 't-cal', label: 'Calido' },
];

const styles = [
  { cls: 's3', title: '1 — Colored Stroke', desc: 'Iconos con trazo de color unico por item. Limpio, moderno, sin fondo.' },
  { cls: 's2', title: '2 — Soft Color Box', desc: 'Cada icono dentro de una caja redondeada con fondo suave de su color. Estilo app moderna.' },
  { cls: 's4', title: '3 — Duotone', desc: 'Iconos con relleno semitransparente + trazo de color. Estilo duotono premium.' },
  { cls: 's1', title: '4 — Colored Icons (sin fondo)', desc: 'Iconos con color propio via CSS variable. Similar al 1 pero con stroke via variable.' },
];

document.addEventListener('DOMContentLoaded', () => {
  const body = document.body;
  styles.forEach((s, si) => {
    const h = document.createElement('h2');
    h.className = 'prop-title';
    h.textContent = s.title;
    body.appendChild(h);
    const d = document.createElement('p');
    d.className = 'prop-desc';
    d.textContent = s.desc;
    body.appendChild(d);
    const row = document.createElement('div');
    row.className = 'row';
    themes.forEach(t => {
      const col = document.createElement('div');
      col.className = 'col';
      const lbl = document.createElement('div');
      lbl.className = 'theme-label';
      lbl.textContent = t.label;
      col.appendChild(lbl);
      const sb = document.createElement('div');
      sb.className = `sb ${s.cls} ${t.cls}`;
      sb.innerHTML = sidebarHTML(s.cls, t.cls);
      col.appendChild(sb);
      row.appendChild(col);
    });
    body.appendChild(row);
  });
});
</script>
