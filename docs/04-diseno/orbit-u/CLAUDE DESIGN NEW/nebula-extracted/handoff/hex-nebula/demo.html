<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hex Nebula · Demo</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#050608;color:#F5F4EF;
    font-family:system-ui,sans-serif}
  canvas#bg{position:fixed;inset:0;z-index:0;display:block}
  .stage{position:fixed;inset:0;z-index:10;display:grid;place-items:center;text-align:center;pointer-events:none}
  h1{font-size:48px;letter-spacing:-.04em;font-weight:900}
  p{margin-top:14px;font-size:11px;letter-spacing:.18em;color:rgba(138,234,192,.8);text-transform:uppercase;font-family:ui-monospace,monospace}
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="stage">
    <div>
      <h1>Hex Nebula</h1>
      <p>Demo · variante 3 · Conniku</p>
    </div>
  </div>
  <script src="hex-nebula.js"></script>
  <script>HexNebula.mount(document.getElementById('bg'));</script>
</body>
</html>
