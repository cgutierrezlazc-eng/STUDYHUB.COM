<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Conniku · Wordmark · Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@900&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="ConnikuWordmark.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0D0F10;
    color:#F5F4EF;
    font-family:'Funnel Display',-apple-system,sans-serif;
    padding:64px 32px;
    min-height:100vh;
  }
  .wrap{max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:48px}
  h1{font-weight:900;font-size:32px;letter-spacing:-.04em;margin-bottom:8px}
  .sub{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,244,239,.5);margin-bottom:32px}
  .row{display:flex;flex-wrap:wrap;gap:24px;align-items:flex-end}
  .card{
    background:rgba(255,255,255,.025);
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:48px 32px 24px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    flex:1;
    min-width:200px;
  }
  .card.light{background:#F5F4EF}
  .card.light .lbl{color:rgba(13,15,16,.5)}
  .card.lime{background:#D9FF3A}
  .card.lime .lbl{color:rgba(13,15,16,.6)}
  .lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,244,239,.5)}

  /* tamaños */
  .s-18 .brand{font-size:18px}
  .s-32 .brand{font-size:32px}
  .s-48 .brand{font-size:48px}
  .s-72 .brand{font-size:72px}
  .s-96 .brand{font-size:96px}
  .s-144 .brand{font-size:144px}

  .hero{
    padding:64px 32px;
    background:radial-gradient(circle at 50% 40%,rgba(217,255,58,.07),transparent 60%);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    text-align:center;
  }
  .hero .brand{font-size:144px}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Conniku · Wordmark</h1>
      <div class="sub">Preview · v1.2 · oficial</div>
    </header>

    <!-- HERO -->
    <div class="hero">
      <span class="brand on-dark">conn<span>i</span><span class="k-letter">k</span><span class="u-pack"><span class="u-letter">u</span><span class="dot"></span></span></span>
    </div>

    <!-- ESCALAS -->
    <section>
      <h2 style="font-size:14px;font-family:'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,244,239,.5);margin-bottom:24px">Escalas</h2>
      <div class="row">
        <div class="card s-18"><span class="brand on-dark">conn<span>i</span><span class="k-letter">k</span><span class="u-pack"><span class="u-letter">u</span><span class="dot"></span></span></span><div class="lbl">18 · NAV</div></div>
        <div class="card s-32"><span class="brand on-dark">conn<span>i</span><span class="k-letter">k</span><span class="u-pack"><span class="u-letter">u</span><span class="dot"></span></span></span><div class="lbl">32 · HEADER</div></div>
        <div class="card s-48"><span class="brand on-dark">conn<span>i</span><span class="k-letter">k</span><span class="u-pack"><span class="u-letter">u</span><span class="dot"></span></span></span><div class="lbl">48 · SIDEBAR</div></div>
        <div class="card s-72"><span class="brand on-dark">conn<span>i</span><span class="k-letter">k</span><span class="u-pack"><span class="u-letter">u</span><span class="dot"></span></span></span><div class="lbl">72 · HERO</div></div>
      </div>
    </section>

    <!-- FONDOS -->
    <section>
      <h2 style="font-size:14px;font-family:'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:rgba(245,244,239,.5);margin-bottom:24px">Sobre fondos</h2>
      <div class="row">
        <div class="card s-48"><span class="brand on-dark">conn<span>i</span><span class="k-letter">k</span><span class="u-pack"><span class="u-letter">u</span><span class="dot"></span></span></span><div class="lbl">INK</div></div>
        <div class="card s-48 light"><span class="brand">conn<span>i</span><span class="k-letter">k</span><span class="u-pack"><span class="u-letter">u</span><span class="dot"></span></span></span><div class="lbl">PAPER</div></div>
        <div class="card s-48 lime"><span class="brand">conn<span>i</span><span class="k-letter">k</span><span class="u-pack"><span class="u-letter">u</span><span class="dot"></span></span></span><div class="lbl">LIME</div></div>
      </div>
    </section>
  </div>
</body>
</html>
