<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bienvenida · Conniku</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" />
<link rel="stylesheet" href="../shared/tokens.css" />
<link rel="stylesheet" href="../shared/base.css" />
<style>
body {
  min-height: 100vh; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden;
  text-align: center;
}

/* ambient orbits */
.ambient-orbits { position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0; }
.ao { position:absolute;border-radius:50%;border:1px solid rgba(232,232,230,0.04);transform:translate(-50%,-50%);left:50%;top:50%; }
.ao.a1  { width:260px; height:260px; border-color:rgba(0,194,122,0.22); animation:pulse-ring 3s ease-in-out infinite; }
.ao.a2  { width:460px; height:460px; border-style:dashed; border-color:rgba(255,74,28,0.18); animation:pulse-ring 3s .4s ease-in-out infinite; }
.ao.a3  { width:660px; height:660px; border-style:dotted; border-color:rgba(0,194,122,0.14); opacity:.85; animation:pulse-ring 3s .8s ease-in-out infinite; }
.ao.a4  { width:880px; height:880px; border-color:rgba(245,244,239,0.08); opacity:.7; animation:pulse-ring 3s 1.2s ease-in-out infinite; }
.ao.a5  { width:1100px;height:1100px;border-style:dashed;border-color:rgba(255,74,28,0.07);opacity:.55; }
.ao.a6  { width:1320px;height:1320px;border-style:dotted;border-color:rgba(0,194,122,0.05);opacity:.4; }
.ao.a7  { width:1540px;height:1540px;border-color:rgba(245,244,239,0.03);opacity:.3; }
.ao.a8  { width:1760px;height:1760px;border-style:dashed;border-color:rgba(0,194,122,0.03);opacity:.2; }
.ao.glow { width:560px;height:560px;border:none;background:radial-gradient(circle,rgba(0,194,122,0.12) 0%,transparent 65%); animation:glow-pulse 3s ease-in-out infinite; }
.star { position:absolute;border-radius:50%;background:rgba(245,244,239,0.7);animation:twinkle var(--dur,3s) ease-in-out infinite;animation-delay:var(--delay,0s); }
.star.s  { width:1.5px;height:1.5px; }
.star.m  { width:2px;height:2px; }
.star.l  { width:3px;height:3px;box-shadow:0 0 6px rgba(245,244,239,0.5); }
.star.green  { background:rgba(0,194,122,0.8); box-shadow:0 0 5px rgba(0,194,122,0.5); }
.star.orange { background:rgba(255,74,28,0.8); box-shadow:0 0 5px rgba(255,74,28,0.5); }
.star.cyan   { background:rgba(138,234,192,0.7);box-shadow:0 0 5px rgba(138,234,192,0.4); }
@keyframes pulse-ring { 0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1);}50%{opacity:.45;transform:translate(-50%,-50%) scale(1.015);} }
@keyframes glow-pulse  { 0%,100%{opacity:1;}50%{opacity:.55;} }
@keyframes twinkle     { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.2;transform:scale(.7);} }

/* content */
.bv-content { position: relative; z-index: 1; max-width: 520px; }

.bv-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--green-3), var(--green-2));
  border: 3px solid var(--green);
  display: grid; place-items: center;
  font-weight: 900; font-size: 24px; color: #0B0C0E;
  margin: 0 auto 28px;
  box-shadow: 0 0 32px rgba(0,194,122,0.4), 0 0 64px rgba(0,194,122,0.15);
  animation: avatar-in .6s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes avatar-in {
  from { transform: scale(0.4); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.bv-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 999px;
  background: rgba(0,194,122,0.1); border: 1px solid rgba(0,194,122,0.3);
  font-family: 'Geist Mono', monospace; font-size: 10px; font-weight: 600;
  color: var(--green-3); letter-spacing: .08em;
  margin-bottom: 20px;
  animation: fade-up .5s .2s ease both;
}
.bv-badge::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
}

.bv-title {
  font-family: 'Funnel Display', sans-serif; font-weight: 900;
  font-size: clamp(32px, 6vw, 52px); letter-spacing: -.04em;
  color: var(--text); margin-bottom: 12px; line-height: 1.05;
  animation: fade-up .5s .35s ease both;
}
.bv-title span { color: var(--green); }

.bv-sub {
  font-size: 15px; color: var(--text-3); line-height: 1.7;
  margin-bottom: 36px; max-width: 420px; margin-left: auto; margin-right: auto;
  animation: fade-up .5s .45s ease both;
}

/* module preview chips */
.bv-modules {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 36px;
  animation: fade-up .5s .55s ease both;
}
.bv-mod {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border); color: var(--text-3);
}
.bv-mod-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.bv-actions {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  animation: fade-up .5s .65s ease both;
}
.btn-enter {
  padding: 16px 48px; border-radius: 14px;
  background: var(--green); color: #0B0C0E;
  font-size: 16px; font-weight: 800; border: none; cursor: pointer;
  transition: all .2s; letter-spacing: -.01em;
  box-shadow: 0 0 32px rgba(0,194,122,0.3);
}
.btn-enter:hover {
  background: var(--green-3);
  box-shadow: 0 0 40px rgba(0,194,122,0.5);
  transform: translateY(-2px);
}
.bv-hint {
  font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-4);
  letter-spacing: .04em;
}

@keyframes fade-up {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>
<body>

<div class="ambient-orbits">
  <div class="ao a1"></div><div class="ao a2"></div><div class="ao a3"></div>
  <div class="ao a4"></div><div class="ao a5"></div><div class="ao a6"></div>
  <div class="ao a7"></div><div class="ao a8"></div><div class="ao glow"></div>
  <span class="star xl"     style="top:6%;left:18%;--dur:3.4s;--delay:0s"></span>
  <span class="star l green"  style="top:14%;left:42%;--dur:2.8s;--delay:.6s"></span>
  <span class="star m"        style="top:9%;left:67%;--dur:3.2s;--delay:1.2s"></span>
  <span class="star l orange" style="top:11%;left:82%;--dur:3.2s;--delay:.4s"></span>
  <span class="star s"        style="top:5%;left:5%;--dur:2.2s;--delay:1.8s"></span>
  <span class="star m"        style="top:8%;left:91%;--dur:4s;--delay:.2s"></span>
  <span class="star l"        style="top:28%;left:8%;--dur:3.6s;--delay:.3s"></span>
  <span class="star s green"  style="top:35%;left:94%;--dur:2.4s;--delay:1.4s"></span>
  <span class="star m orange" style="top:65%;left:3%;--dur:3.8s;--delay:.8s"></span>
  <span class="star xl"       style="top:72%;left:88%;--dur:2.9s;--delay:.1s"></span>
  <span class="star s"        style="top:80%;left:22%;--dur:3.1s;--delay:2s"></span>
  <span class="star l cyan"   style="top:88%;left:65%;--dur:4.2s;--delay:.5s"></span>
</div>

<div class="bv-content">

  <div style="text-align:center;margin-bottom:20px;animation:fade-up .4s ease both">
    <a href="../landing.html" class="brand" style="font-size:24px">conn<span>i</span>k<span class="u-pack">u<span class="dot">.</span></span></a>
  </div>

  <div class="bv-avatar" id="bv-av">CG</div>

  <div class="bv-badge">Cuenta verificada · Orbit·U activado</div>

  <h1 class="bv-title">Bienvenido a<br><span>Conniku</span>, Cristián.</h1>

  <p class="bv-sub">Tu hub universitario está listo. Todos tus módulos, tus ramos y tu comunidad en un solo lugar.</p>

  <div class="bv-modules">
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#6B4EFF"></div>Workspaces</div>
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#00C27A"></div>Mensajes</div>
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#C49A3A"></div>Biblioteca</div>
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#A8C800"></div>Cursos</div>
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#0096CC"></div>Comunidades</div>
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#B0ADA4"></div>Calendario</div>
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#CC3D2A"></div>Tutores</div>
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#00A068"></div>Empleo</div>
    <div class="bv-mod"><div class="bv-mod-dot" style="background:#7C3AED"></div>Athena</div>
  </div>

  <div class="bv-actions">
    <button class="btn-enter" onclick="enterApp()">Entrar a Orbit·U →</button>
    <div class="bv-hint">Tu universo universitario te espera</div>
  </div>

</div>

<script>
function enterApp() {
  window.location.href = 'orbit-u.html';
}
</script>
<script src="../shared/theme-loader.js"></script>
</body>
</html>
