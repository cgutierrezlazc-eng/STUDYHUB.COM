<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#F5F4EF"/>
      <stop offset="100%" stop-color="#EBE9E1"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Splatter dots decorativos -->
  <circle cx="180" cy="120" r="12" fill="#FF4D3A"/>
  <circle cx="240" cy="90" r="6" fill="#6B4EFF"/>
  <circle cx="1020" cy="140" r="14" fill="#00C2FF"/>
  <circle cx="1080" cy="520" r="10" fill="#FFE9B8"/>
  <circle cx="200" cy="540" r="8" fill="#D9FF3A"/>
  <circle cx="150" cy="490" r="16" fill="#0D0F10"/>

  <!-- App icon grande (tile v2.0) -->
  <g transform="translate(100, 220)">
    <rect width="180" height="180" rx="40" fill="#D9FF3A"/>
    <text x="90" y="140" text-anchor="middle" font-family="Funnel Display, -apple-system, sans-serif" font-weight="900" font-size="152" fill="#0D0F10" letter-spacing="-7">u</text>
    <circle cx="153" cy="137" r="11" fill="#FF4A1C"/>
