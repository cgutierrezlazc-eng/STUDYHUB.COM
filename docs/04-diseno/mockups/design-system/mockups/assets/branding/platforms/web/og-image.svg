  <!-- Highlight lime en "sola" -->
  <rect x="567" y="345" width="180" height="68" rx="12" fill="#D9FF3A" transform="rotate(-1.2 657 379)"/>
  <text x="577" y="400" font-family="Funnel Display, -apple-system, sans-serif" font-weight="900" font-size="96" fill="#181F08" letter-spacing="-4" transform="rotate(-1.2 657 379)">sola</text>

