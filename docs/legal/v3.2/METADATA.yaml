  cookies:
    version: "1.0.0"
    sha256: "80d41f71f075ae954a4e5f1763266b9830d38849bbe79a7bb931c2a4ee30e38c"
    vigencia_desde: "2026-04-21"
    vigencia_hasta: "actual"
    archivo: "v3.2/cookies.md"
    autor_aprobacion: "Cristian Gutiérrez Lazcano (CEO Conniku SpA)"
    aprobacion_fecha: "2026-04-21"
    nota: >
      Primera versión pública y canónica de la Política de Cookies
      (Pieza 5 del bloque bloque-legal-consolidation-v2). Supersede al
      stub anterior que compartía hash con v3.1/cookies.md y violaba
      GDPR Art. 7(1) al tener usuarios aceptando implícitamente un
      documento marcado "NO PUBLICAR". Documenta inventario real de
      cookies y localStorage; clasifica cc_visitor_uuid como esencial
      (Capa 0 D-01 Opción A) con las 4 condiciones: plazo 13 meses,
      uso restringido, regeneración al retirar consentimiento,
      declaración explícita; base legal Art. 6(1)(b) GDPR para
      funcionales post-login; retención 5 años post-delete
      (Art. 17(3)(e) GDPR + Art. 2515 Código Civil chileno);
      pseudonimización de IP y User-Agent a 12 meses; vigencia
      Ley 21.719 desde 2026-12-01 (CVE-2583630, Art. 1° transitorio).

