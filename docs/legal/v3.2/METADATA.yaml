      re-validación de hash de consentimiento); bidireccionalidad
      (noreply@ con Reply-To contacto@) sin auto-ingesta IMAP
      todavía; retención 5 años fundada en Art. 17(3)(e) GDPR +
      Art. 2515 CC Chile + Ley 19.496 Art. 50; derechos del titular
      sobre los tickets. Tabla §6 de encargados: Zoho Mail
      ampliado como encargado Art. 28 GDPR para el canal email,
      con DPA oficial https://www.zoho.com/gdpr.html y política
      https://www.zoho.com/privacy.html. §9 incluye nueva línea
      de retención tickets. §11 agrega subsección 11.1 Historial
      de versiones. §14 menciona Zoho en transferencias
      internacionales. Hash anterior 2.4.0 era
      7a8ba81d0be22cc1deee7d92764baaac1a598a662b84d9ba90043b2a25f63f6c.

