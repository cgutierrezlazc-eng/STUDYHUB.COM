      Bump v2.4.0 → v2.4.1 por bloque bloque-contact-tickets-v1
      (decisión Cristian 2026-04-22 Opción A: bump en el mismo PR
      del bloque). Cambios: nueva Sección 2bis "Sistema de tickets
      de contacto" con datos recolectados por ticket (incluyendo
      consent_hash, IP, UA truncado a 512 chars, timezone),
      base legal Art. 6(1)(a) GDPR + Ley 19.628 Art. 4° con
