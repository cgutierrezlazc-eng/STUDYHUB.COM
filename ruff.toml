# Ruff — Python linter para backend CONNIKU
target-version = "py311"
line-length = 120

[lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes (imports sin usar, variables sin definir)
  "W",    # pycodestyle warnings
  "I",    # isort (orden de imports)
  "B",    # flake8-bugbear (errores comunes)
  "SIM",  # flake8-simplify
  "UP",   # pyupgrade
]
ignore = [
  "E501",   # line too long (lo maneja line-length arriba)
  "E402",   # module import not at top (necesario en algunos archivos)
  "F401",   # imported but unused (a veces intencional)
  "B008",   # function call in default argument (FastAPI Depends() lo usa)
  "UP007",  # Optional vs X | None (compatibilidad)
  "UP035",  # typing.List/Dict deprecated — necesario para Python 3.9 compat
  "UP045",  # Optional[X] vs X | None — Pydantic en 3.9 no soporta X | None
  "E711",   # comparison to None — SQLAlchemy requiere == None, no 'is None'
  "E712",   # comparison to True/False — SQLAlchemy requiere == True, no 'is True'
  "E722",   # bare except — legacy code, arreglar oportunísticamente
  "B904",   # raise from — legacy code, arreglar oportunísticamente
  "F541",   # f-string sin placeholders — cosmético
  "SIM105", # contextlib.suppress — preferencia de estilo
  "SIM114", # combine if branches — preferencia de estilo
  "I001",   # import sort — legacy, arreglar oportunísticamente
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
