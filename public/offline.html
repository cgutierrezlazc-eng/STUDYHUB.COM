<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexion — Conniku</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #2D62C8;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .logo-text span { color: #2D62C8; }
    .icon-offline {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: rgba(45,98,200,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #8b949e;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #2D62C8;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #2555b0; }
    .tips {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      text-align: left;
    }
    .tips h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tips li {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 6px;
      list-style: none;
      padding-left: 20px;
      position: relative;
    }
    .tips li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 7px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2D62C8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" width="24" height="24">
          <circle cx="20" cy="20" r="12" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-dasharray="56 19" />
        </svg>
      </div>
      <div class="logo-text">conni<span>ku</span></div>
    </div>

    <div class="icon-offline">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#2D62C8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>Sin conexion</h1>
    <p>No pudimos conectar con Conniku. Revisa tu conexion a internet e intenta de nuevo.</p>

    <button class="btn" onclick="window.location.reload()">Reintentar</button>

    <div class="tips">
      <h3>Mientras tanto</h3>
      <ul>
        <li>Verifica que tu WiFi o datos esten activos</li>
        <li>Si usas VPN, intenta desactivarla</li>
        <li>El contenido visitado recientemente puede estar disponible offline</li>
      </ul>
    </div>
  </div>
</body>
</html>
