<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <!-- Blue square logomark with open C circle -->
  <rect x="2" y="8" width="44" height="44" rx="12" fill="#2D62C8"/>
  <circle cx="24" cy="30" r="12" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="56 19"/>
  <!-- conni in white (for dark backgrounds) -->
  <text x="56" y="44" font-family="Outfit, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#F5F7F8" letter-spacing="-1.5">conni</text>
  <!-- ku in blue -->
  <text x="180" y="44" font-family="Outfit, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#2D62C8" letter-spacing="-1.5">ku</text>
</svg>
