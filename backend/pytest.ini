[pytest]
# Configuración pytest para el backend Conniku.
# TDD obligatorio según CLAUDE.md §TDD obligatorio para backend-builder.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    legal: tests que validan cumplimiento legal (verificación edad, user_agreements, retracto)
    slow: tests que tardan más de 1 segundo
