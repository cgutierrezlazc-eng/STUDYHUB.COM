[mypy]
# Configuración mypy para backend Conniku.
#
# Scope: solo los módulos del Bloque 2 Workspaces (2a/2b/2c/2d) + utilitarios
# propios creados durante este ciclo de trabajo. Los módulos backend
# preexistentes (hr_routes, auth_routes, payment_routes, etc.) quedan fuera
# del scope porque tienen deuda técnica acumulada de migraciones viejas.
#
# Cuando se haga el refactor global de tipado, ampliar la lista de `files`.
files =
    apa_validator.py,
    rubric_parser.py,
    workspaces_athena.py,
    workspaces_export.py,
    workspaces_routes.py,
    workspaces_ws.py,
    tier_gate.py

ignore_missing_imports = True
warn_return_any = False
no_strict_optional = True

# database.py tiene un comentario legacy que mypy interpreta como type comment:
#   # type: article | book | talk | media | achievement | project | insight
# El error es preexistente. Se excluye del análisis hasta que el comentario
# se reformule en una iteración futura de saneamiento.
[mypy-database]
ignore_errors = True
