[mypy]
# Configuración mypy para backend Conniku.
# ignore_missing_imports: los módulos del proyecto no tienen stubs.
ignore_missing_imports = True
# warn_return_any: deshabilitado porque hay mucho Any heredado.
warn_return_any = False

# database.py tiene un comentario de documentación en línea 115:
#   # type: article | book | talk | media | achievement | project | insight
# Mypy lo interpreta como un type comment inválido → syntax error.
# El error es preexistente y pertenece al archivo database.py, no al código
# nuevo. Se excluye database.py del análisis de mypy hasta que se corrija
# el comentario en ese archivo.
[mypy-database]
ignore_errors = True
