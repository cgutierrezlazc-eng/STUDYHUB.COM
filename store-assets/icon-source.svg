<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3A7A"/>
      <stop offset="100%" stop-color="#2D62C8"/>
    </linearGradient>
  </defs>
  <!-- Background — mismo gradiente, mismos bordes redondeados -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- ik bicolor: i blanco, k azul claro — pegados, centrados -->
  <text
    font-family="Outfit, -apple-system, Helvetica, Arial, sans-serif"
    font-size="290"
    font-weight="800"
    text-anchor="middle"
    y="340">
    <tspan x="256" fill="#FFFFFF">i</tspan><tspan fill="#8FC5FF">k</tspan>
  </text>
</svg>
