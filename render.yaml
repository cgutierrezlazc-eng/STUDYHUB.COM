services:
  - type: web
    name: conniku-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 8899
      - key: JWT_SECRET
        generateValue: true
      - key: OWNER_PASSWORD
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGINS
        value: "https://conniku.com,https://www.conniku.com,https://conniku.vercel.app"
        # Dev: agrega http://localhost:5173 solo en tu .env.local — NUNCA en producción
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: conniku-db
          property: connectionString
      # AI features — set these in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      # Email notifications — Zoho Mail (cada cuenta necesita su propia contraseña)
      - key: SMTP_HOST
        value: smtp.zoho.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      # Contraseñas por cuenta — configurar en Render Dashboard
      - key: SMTP_PASS_NOREPLY
        sync: false
      - key: SMTP_PASS_CONTACTO
        sync: false
      - key: SMTP_PASS_CEO
        sync: false
      # Direcciones por cuenta
      - key: NOREPLY_EMAIL
        value: noreply@conniku.com
      - key: CONTACT_EMAIL
        value: contacto@conniku.com
      - key: CEO_EMAIL
        value: ceo@conniku.com
      - key: SMTP_FROM
        value: ceo@conniku.com
      - key: FRONTEND_URL
        value: "https://conniku.com"

databases:
  - name: conniku-db
    plan: free
    databaseName: conniku
    user: conniku_user
