services:
  - type: web
    name: conniku-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 8899
      - key: JWT_SECRET
        generateValue: true
      - key: OWNER_PASSWORD
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGINS
        value: "https://conniku.com,https://www.conniku.com,https://studyhub-com.vercel.app,http://localhost:5173,http://localhost:8899"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: conniku-db
          property: connectionString
      # AI features — set this in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      # Email notifications
      - key: SMTP_HOST
        value: smtp.zoho.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@conniku.com
      # Stripe payments (configure when ready)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_YEARLY
        sync: false
      - key: FRONTEND_URL
        value: "https://conniku.com"

databases:
  - name: conniku-db
    plan: free
    databaseName: conniku
    user: conniku_user
