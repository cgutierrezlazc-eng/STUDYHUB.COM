services:
  - type: web
    name: studyhub-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 8899
      - key: JWT_SECRET
        generateValue: true
      - key: OWNER_PASSWORD
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGINS
        value: "https://conniku.com,https://www.conniku.com"
