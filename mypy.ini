[mypy]
# Configuración mypy para el proyecto Conniku.
#
# Contexto: el backend completo usa SQLAlchemy 2.x con el patrón clásico
# Base = declarative_base() sin sqlalchemy[mypy] plugin. Esto genera
# cientos de errores preexistentes en todos los módulos del backend.
#
# follow_imports = skip: mypy no sigue los imports a módulos externos al
# archivo analizado. Esto evita que errores preexistentes en database.py,
# workspaces_routes.py, middleware.py, etc. bloqueen el análisis de
# archivos nuevos y correctamente tipados (workspaces_export.py).
#
# ignore_missing_imports: módulos sin stubs (bleach, weasyprint, etc.)
# no generan error.
#
# La deuda técnica está documentada: agregar sqlalchemy2-stubs o migrar a
# mapped_column() con Mapped[] es trabajo para un bloque dedicado de
# hardening backend, no scope del sub-sub-bloque 2d.7.
ignore_missing_imports = True
follow_imports = skip
warn_return_any = False

[mypy-database]
# database.py usa Base = declarative_base() (SQLAlchemy clásico).
# mypy 1.x sin sqlalchemy[mypy] plugin reporta 200+ errores válidos-tipo
# en cada definición de modelo. Son errores preexistentes del codebase
# completo, no introducidos por cambios recientes.
ignore_errors = True

[mypy-server]
# server.py tiene errores preexistentes propios:
# - pytz sin stubs (types-pytz no instalado)
# - Optional implícita en parámetro con default=None
# Ambos son deuda técnica preexistente.
ignore_errors = True
